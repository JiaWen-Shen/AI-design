<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <style>
    .pair-label { font: 600 22px 'Inter',Arial,'PingFang TC','Hiragino Sans TC','Noto Sans CJK TC','Microsoft JhengHei',sans-serif; fill: #153241; }
    .pair-sub { font: 500 16px 'PingFang TC','Hiragino Sans TC','Noto Sans CJK TC','Microsoft JhengHei','Inter',Arial,sans-serif; fill: #788086; }
    .caption { font: 500 24px 'Inter',Arial,sans-serif; fill: #153241; }
    .cap-em { font: 700 24px 'Inter',Arial,sans-serif; fill: #D71920; }
  </style>
  <rect width="1600" height="900" fill="#FFFFFF"/>

  <!-- TOP ROW: Camera pair -->
  <!-- Left: Point-and-shoot (simple) -->
  <rect x="200" y="140" width="260" height="180" rx="12" fill="#F4F6F7"/>
  <rect x="240" y="170" width="180" height="120" rx="8" fill="#153241"/>
  <circle cx="330" cy="230" r="38" fill="#F4F6F7"/>
  <circle cx="330" cy="230" r="24" fill="#153241"/>
  <circle cx="330" cy="230" r="12" fill="#788086"/>
  <rect x="395" y="180" width="18" height="10" rx="2" fill="#D71920"/>
  <text x="330" y="355" text-anchor="middle" class="pair-label">Point-and-shoot</text>
  <text x="330" y="380" text-anchor="middle" class="pair-sub">傻瓜相機</text>

  <!-- Separator -->
  <line x1="750" y1="170" x2="750" y2="390" stroke="#788086" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Right: DSLR (complex) -->
  <rect x="1040" y="130" width="320" height="200" rx="12" fill="#153241"/>
  <!-- grip -->
  <rect x="1040" y="180" width="60" height="140" rx="12" fill="#0A1A23"/>
  <!-- lens -->
  <circle cx="1200" cy="230" r="70" fill="#0A1A23"/>
  <circle cx="1200" cy="230" r="54" fill="#153241" stroke="#788086" stroke-width="2"/>
  <circle cx="1200" cy="230" r="36" fill="#0A1A23"/>
  <circle cx="1200" cy="230" r="18" fill="#788086"/>
  <!-- dials -->
  <circle cx="1100" cy="160" r="14" fill="#788086"/>
  <circle cx="1300" cy="160" r="14" fill="#788086"/>
  <rect x="1275" y="180" width="60" height="8" rx="2" fill="#D71920"/>
  <!-- viewfinder bump -->
  <rect x="1170" y="110" width="60" height="20" rx="4" fill="#153241"/>
  <text x="1200" y="365" text-anchor="middle" class="pair-label">DSLR</text>
  <text x="1200" y="390" text-anchor="middle" class="pair-sub">單眼</text>

  <!-- Horizontal separator -->
  <line x1="200" y1="470" x2="1400" y2="470" stroke="#F4F6F7" stroke-width="2"/>

  <!-- BOTTOM ROW: Gear shift pair -->
  <!-- Left: Automatic (P-R-N-D) -->
  <rect x="200" y="520" width="260" height="200" rx="12" fill="#F4F6F7"/>
  <rect x="300" y="540" width="60" height="160" rx="30" fill="#153241"/>
  <circle cx="330" cy="600" r="16" fill="#D71920"/>
  <text x="240" y="575" class="pair-sub" font-size="18" font-weight="700" fill="#153241">P</text>
  <text x="240" y="605" class="pair-sub" font-size="18" font-weight="700" fill="#153241">R</text>
  <text x="240" y="635" class="pair-sub" font-size="18" font-weight="700" fill="#153241">N</text>
  <text x="240" y="665" class="pair-sub" font-size="18" font-weight="700" fill="#D71920">D</text>
  <text x="330" y="755" text-anchor="middle" class="pair-label">Automatic</text>
  <text x="330" y="780" text-anchor="middle" class="pair-sub">自排車</text>

  <!-- Separator -->
  <line x1="750" y1="550" x2="750" y2="790" stroke="#788086" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Right: Manual H-pattern -->
  <rect x="1040" y="520" width="320" height="200" rx="12" fill="#F4F6F7"/>
  <!-- H pattern -->
  <line x1="1120" y1="580" x2="1280" y2="580" stroke="#153241" stroke-width="4"/>
  <line x1="1120" y1="660" x2="1280" y2="660" stroke="#153241" stroke-width="4"/>
  <line x1="1200" y1="580" x2="1200" y2="660" stroke="#153241" stroke-width="4"/>
  <circle cx="1120" cy="580" r="12" fill="#153241"/><text x="1120" y="560" text-anchor="middle" font-size="14" font-weight="700" fill="#153241">1</text>
  <circle cx="1200" cy="580" r="12" fill="#153241"/><text x="1200" y="560" text-anchor="middle" font-size="14" font-weight="700" fill="#153241">3</text>
  <circle cx="1280" cy="580" r="12" fill="#153241"/><text x="1280" y="560" text-anchor="middle" font-size="14" font-weight="700" fill="#153241">5</text>
  <circle cx="1120" cy="660" r="12" fill="#153241"/><text x="1120" y="693" text-anchor="middle" font-size="14" font-weight="700" fill="#153241">2</text>
  <circle cx="1200" cy="660" r="12" fill="#153241"/><text x="1200" y="693" text-anchor="middle" font-size="14" font-weight="700" fill="#153241">4</text>
  <circle cx="1280" cy="660" r="12" fill="#D71920"/><text x="1280" y="693" text-anchor="middle" font-size="14" font-weight="700" fill="#D71920">6</text>
  <text x="1200" y="755" text-anchor="middle" class="pair-label">Manual</text>
  <text x="1200" y="780" text-anchor="middle" class="pair-sub">手排車</text>

  <!-- Caption strip -->
  <rect x="300" y="830" width="1000" height="50" rx="25" fill="#FBE5E6"/>
  <text x="400" y="862" class="caption">Claude Design</text>
  <text x="645" y="862" class="cap-em">easier to drive</text>
  <text x="855" y="862" class="caption">· Claude Code</text>
  <text x="1080" y="862" class="cap-em">wider range</text>
</svg>